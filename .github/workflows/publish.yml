name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish @automagent/schema
        run: npm publish --workspace=packages/schema --provenance --access public

      - name: Publish automagent CLI
        run: npm publish --workspace=packages/cli --provenance --access public
